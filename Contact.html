<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <img src="pic/car-logo.png" class="logo" alt="Logo">
            <div class="menu">
                <a href="Home.html">Home</a>
                <a href="about.html">About</a>
                <a href="feature.html">Feature</a>
                <a href="variations.html">Variations</a>
                <a href="specials.html">Specials</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
            <div class="social">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </div>
        </nav>
    </header>

    <main class="page-screen">
        <div class="content-wrap">
            <div class="left-col">
                <p class="eyebrow">Get In Touch</p>
                <h1>Contact <span>Us</span></h1>
                <p class="desc">Have a question, want to book a test drive, or just want to talk cars? We'd love to hear from you. Reach out through any of the channels below.</p>
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fa-solid fa-phone"></i>
                        <span>+1 800 CAR-FAST</span>
                    </div>
                    <div class="contact-item">
                        <i class="fa-solid fa-envelope"></i>
                        <span>hello@carco.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>12 Motorsport Ave, Speed City</span>
                    </div>
                </div>
            </div>
            <div class="right-col contact-form-col">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Tell us what you need..."></textarea>
                </div>
                <button class="btn">Send Message</button>
            </div>
        </div>
    </main>
</body>
</html>
